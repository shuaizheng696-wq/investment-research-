# GitHub Actions — 每日定时数据采集

name: Daily Market Data Collection

on:
  schedule:
    # 周一至周五 UTC 00:00 (北京时间早上8点)
    - cron: '0 0 * * 1-5'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许推送到仓库

jobs:
  full-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market data collection
        run: python scripts/market_data.py

      - name: Run options scan
        run: python scripts/options_scan.py

      - name: Run earnings analysis
        run: python scripts/earnings_analysis.py

      - name: Run sentiment tracker
        run: python scripts/sentiment_tracker.py

      - name: Commit all collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "[auto] 每日数据更新 $(date +%Y-%m-%d)"
          git push
