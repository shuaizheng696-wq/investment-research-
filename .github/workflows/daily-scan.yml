name: Daily Market Data Collection

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  full-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market data collection
        run: python scripts/market_data.py

      - name: Run options scan
        run: python scripts/options_scan.py

      - name: Run earnings analysis
        run: python scripts/earnings_analysis.py

      - name: Run YouTube analysis
        run: python scripts/youtube_analysis.py

      - name: Run Twitter scraper
        run: python scripts/twitter_scraper.py
        continue-on-error: true

      - name: Run economic calendar
        run: python scripts/calendar_scraper.py

      - name: Commit all collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "[auto] daily update $(date +%Y-%m-%d)"
          git push
